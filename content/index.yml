faq:
  title: Questions fréquentes
  description: Tout ce que vous devez savoir avant de lancer votre projet de développement web.
  items:
    - label: Combien de temps faut-il pour concevoir un site web professionnel ?
      content: "Pour un site vitrine professionnel de taille standard, prévoyez entre 2 et 3 semaines, incluant l'itération design et le déploiement. S'il s'agit d'une plateforme e-commerce ou d'une application SaaS complexe impliquant une base de données sur-mesure et des espaces membres, le délai s'étend de 4 à 6 semaines en moyenne. Je m'engage à fournir un rétroplanning très détaillé dès l'étape du devis initial, que je vous retourne systématiquement sous 24h ouvrées."
    - label: Proposez-vous la maintenance applicative une fois le site en ligne ?
      content: "Absolument. La pérennité d'un outil digital est essentielle. Je propose des forfaits mensuels de tierce maintenance applicative (TMA) accessibles (à partir de 30€/mois). Ce service couvre les correctifs et mises à jour de sécurité de vos modules Vue.js et Nuxt, le suivi et l'optimisation continue de vos métriques SEO (Search Engine Optimization), les sauvegardes (backups) automatiques de votre base de données, ainsi qu'un monitoring constant garantissant que votre site reste toujours en ligne (uptime)."
    - label: Pourquoi privilégier une solution comme Nuxt.js plutôt qu'un CMS traditionnel comme WordPress ?
      content: "L'écosystème Nuxt/Vue.js s'inscrit dans l'approche de pointe appelée Jamstack. Concrètement, cela permet d'obtenir des performances de vitesse d'affichage jusqu'à 10 fois supérieures par rapport à un WordPress classique. De plus, l'architecture dite 'headless' désolidarise le front-end (l'interface visuelle) du back-end (le moteur et la base de données), réduisant drastiquement les vecteurs de cyberattaques. Enfin, sur le plan du référencement naturel, la capacité fine de SSR de Nuxt offre un contrôle chirurgical et total de l'HTML transmis aux robots de Google, surpassant très largement les plugins généralistes."
