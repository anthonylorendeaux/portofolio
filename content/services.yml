about:
  headline: Pourquoi travailler avec moi
  title: Un développeur freelance, pas une agence
  description: L'avantage ? Vous avez un interlocuteur unique du début à la fin. Pas de chef de projet, pas de turn-over, pas de mauvaise surprise.
  items:
    - title: Contact direct
      description: Vous discutez directement avec le développeur. Pas de intermédiaire qui perd les infos en chemin.
      icon: i-lucide-phone
    - title: Stack moderne
      description: Nuxt 4, Supabase, Stripe, Cloudflare. Technologies éprouvées, performantes, maintainables.
      icon: i-lucide-cpu
    - title: Performance web
      description: Sites notés 90+ sur Google PageSpeed. Temps de chargement minimal = meilleur SEO et conversion.
      icon: i-lucide-zap
    - title: SEO technique
      description: Meta, sitemap, Schema.org, performance web... Tout Built-in. Votre site est prêt pour Google.
      icon: i-lucide-search
    - title: Simplicité de gestion
      description: Pas de plugin à activer, pas de mise à jour hebdomadaire. Votre site fonctionne, point.
      icon: i-lucide-hand-heart

faq:
  title: Questions fréquentes
  description: Les réponses aux questions essentielles avant de lancer votre projet.
  items:
    - label: Quels sont les délais ?
      content: 14 jours pour un site vitrine, 21 jours pour un e-commerce ou SaaS. Ces délais incluent les révisions. On tient les délais, toujours.
    - label: Comment se passe le paiement ?
      content: 50% à la commande, 50% à la livraison. Via Stripe (CB 3D Secure) ou virement. Pas de prélèvements automatiques.
    - label: Puis-je modifier mon site moi-même ?
      content: Oui. Chaque offre inclut un CMS pour modifier textes et images. Le forfait maintenance 30€/mois couvre les changements plus complexes.
    - label: Quelle différence entre vitrine et e-commerce ?
      content: Vitrine = présentation de vos services, formulaire de contact. E-commerce = possibilidade de vendre avec paiement en ligne.
    - label: Quand choisir une application SaaS ?
      content: "Quand vous avez besoin d'un outil métier: gestion clients, abonnements récurrents. Prix plus élevé, mais un outil fait pour votre activité."

cta:
