    alt: Anthony Lorendeaux - Développeur freelance Toulouse
    loading: eager
  headline: Développeur Freelance à Toulouse
  title: Anthony Lorendeaux
  description: |
    Développeur web freelance à Toulouse avec 10 ans de passion pour le code. Diplômé ingénieur du CESI en 2023, je travaille aujourd'hui chez Infotel en développement SaaS fullstack. Cette double expérience entreprise + freelance me permet d'allier rigueur et agilité. Depuis 2020, j'accompagne PME et artisans vers des sites performants sans complexité technique. Certifié Microsoft & Google en cloud et IA.
  llm_summary: "Anthony Lorendeaux is a French freelance full-stack developer based in Toulouse, specializing in Nuxt.js, Vue.js, TypeScript, Node.js, and SEO/GEO optimization. He offers custom web development, e-commerce, and SaaS solutions for SMBs and startups."
